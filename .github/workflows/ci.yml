name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          PIP="python3 -m pip install --quiet --user --break-system-packages"
          $PIP 'websockets>=13.0' 'numpy>=1.24' 'Pillow>=10.0' 'cryptography>=41.0'
          $PIP 'av>=12.0' 2>/dev/null && echo "av: installed" || echo "av: not available (JPEG fallback)"
          $PIP pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-Quartz \
               pyobjc-framework-AVFoundation pyobjc-framework-ScreenCaptureKit \
               2>/dev/null && echo "PyObjC: installed" || echo "PyObjC: partial"

      - name: Start mac-vnc-stream server
        run: |
          nohup python3 server.py \
            --listen 127.0.0.1 \
            --port 6081 \
            --password citest \
            --no-manage-screensharingd \
            > /tmp/macvncstream.log 2>&1 &

          echo -n "Waiting for server..."
          for i in $(seq 1 20); do
            nc -z 127.0.0.1 6081 2>/dev/null && echo " UP" && break
            sleep 1; echo -n "."
          done

      - name: Drive screen activity
        run: |
          # Bouncing-shape NSWindow at 60fps (stress-level animation — see ci_animate.py).
          # Avoids osascript (blocks 2min on Terminal first launch) and Chrome
          # (5-10s startup). PyObjC is already installed by the step above.
          # Kept alive across BOTH the smoke test and the 2Mbps stability test.
          nohup python3 tests/ci_animate.py > /tmp/animate.log 2>&1 &
          echo $! > /tmp/animate_pid
          # Audio loop for the audio smoke test
          nohup bash -c 'while true; do say -v Samantha "audio test"; sleep 0.1; done' \
            > /tmp/say.log 2>&1 &
          echo $! > /tmp/say_pid
          sleep 5
          echo "Screen activity started (animate PID: $(cat /tmp/animate_pid))"

      - name: Run smoke tests (SCK video + audio)
        run: python3 tests/ci_smoke.py 6081 citest

      - name: Run 2Mbps stability test
        run: |
          # Simulates a Chrome DevTools 2Mbps throttle via virtual-clock pacing.
          # ci_animate's 50-ball stress + tail-window measurement (last 15s)
          # observe the controller's post-recovery equilibrium. Server diag
          # confirms AIMD works correctly (ctrl_br ramps 300k → 50000k after
          # a drain event), so the bottleneck on encoded bytes-out is content
          # entropy, not the controller — H.264 just compresses synthetic ball
          # motion to ~1.2Mbps regardless of bandwidth budget.
          #
          # Pass criteria:
          #   - no disconnect
          #   - steady-state lag < 2000ms
          #   - avg fps >= 20  (responsiveness — exempted if runner CPU/compositor
          #                     is the bottleneck, not the system)
          #   - tail link >= 1.0Mbps  ("not collapsed at the floor"; matches
          #                            what the runner content/encoder produces.
          #                            Pushing higher would need artificial
          #                            high-entropy content, not a system test.)
          python3 tests/test_2mbps.py 6081 citest 20 1.0

      - name: Run 2Mbps saturation test (high-bandwidth realistic content)
        run: |
          # Replaces the bouncing-balls animator with the "saturation" mode
          # (250 small gradient-shaded blobs — many independent motions, smooth
          # shading; looks like flowing video texture). Stays compressible
          # but pushes encoded output past 1.7Mbps so the controller is
          # forced to find equilibrium AGAINST the 2Mbps cap, not under it.
          # The fps-stays-at-20 contract is the real responsiveness proof.
          kill "$(cat /tmp/animate_pid)" 2>/dev/null || true
          sleep 1
          STRESS_MODE=saturation nohup python3 tests/ci_animate.py \
            > /tmp/animate_sat.log 2>&1 &
          echo $! > /tmp/animate_pid
          sleep 3
          # tail link >= 1.5Mbps  (controller saturated against 2Mbps cap;
          #                        leaves 0.5Mbps margin for runner variance)
          python3 tests/test_2mbps.py 6081 citest 20 1.5

      - name: Run real-TCP 2Mbps throttle test (Chrome DevTools-equivalent)
        run: |
          # Regression test for the disconnect bug: Chrome DevTools' 2Mbps
          # throttle injects real TCP backpressure (unlike our virtual-clock
          # test which only models the throttle client-side). The proxy below
          # replicates that — server→proxy is localhost (no backpressure),
          # proxy drains to client at 2Mbps with realistic latency/jitter,
          # so the server's TCP send buffer fills naturally and exposes any
          # VBR-overshoot or write-buffer-blowup bugs.
          #
          # 40ms latency + 30ms jitter approximates a hotel WiFi link.
          nohup python3 tests/tcp_throttle.py 6082 6081 2000 \
            --latency 40 --jitter 30 \
            > /tmp/throttle.log 2>&1 &
          echo $! > /tmp/throttle_pid
          sleep 2
          # Pass criteria: NO disconnect over the 70s test, lag stays bounded,
          # tail link does NOT need to hit 1.5Mbps here (the throttle adds
          # real-network jitter so the controller's equilibrium is lower).
          # 0.6Mbps minimum is "controller didn't collapse to floor under
          # real backpressure" — the bar this test exists to defend.
          python3 tests/test_2mbps.py 6082 citest 20 0.6
          kill "$(cat /tmp/throttle_pid)" 2>/dev/null || true

      - name: Stop screen activity
        if: always()
        run: |
          kill "$(cat /tmp/animate_pid)" 2>/dev/null || true
          kill "$(cat /tmp/say_pid)"    2>/dev/null || true

      - name: Upload server log on failure
        if: failure()
        run: |
          echo "=== Server log ==="
          cat /tmp/macvncstream.log
          echo "=== Animate log ==="
          cat /tmp/animate.log 2>/dev/null || echo "(no animate log)"
