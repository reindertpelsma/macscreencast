name: tmate macOS scratch test

# Manual trigger only — this is an interactive debugging/install-smoke workflow.
# Run it from the Actions tab: Actions → tmate macOS scratch test → Run workflow
on:
  workflow_dispatch:

jobs:
  scratch-install:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Install Python deps (mirrors what setup.sh does) ─────────────────
      - name: Install Python dependencies
        run: |
          # --break-system-packages needed on macOS runners with Homebrew Python (PEP 668)
          PIP="python3 -m pip install --quiet --user --break-system-packages"

          $PIP \
            'websockets>=13.0' \
            'numpy>=1.24' \
            'Pillow>=10.0' \
            'cryptography>=41.0'

          if $PIP 'av>=12.0' 2>/dev/null; then
            echo "av (PyAV/H.264): installed"
          else
            echo "av not available — server will fall back to JPEG"
          fi

          $PIP \
            pyobjc-core \
            pyobjc-framework-Cocoa \
            pyobjc-framework-Quartz \
            pyobjc-framework-AVFoundation \
            pyobjc-framework-ScreenCaptureKit \
            2>/dev/null && echo "PyObjC: installed" || echo "PyObjC: partial (expected in headless CI)"

      # ── Try to enable screensharingd (VNC on port 5900) ───────────────────
      # GH macOS runners are real VMs with a GUI session, so screensharingd
      # can be started with sudo. If it works, the server can use VNC mode
      # to capture the screen (no Screen Recording permission needed for VNC).
      - name: Enable screensharingd
        run: |
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true
          sleep 2
          nc -z 127.0.0.1 5900 && echo "screensharingd UP on :5900" || echo "screensharingd not listening"

      # ── Start the server ──────────────────────────────────────────────────
      - name: Start mac-vnc-stream server
        env:
          MVS_PASSWORD: citest
          MACOS_USER: runner
          MACOS_PASS: ""
        run: |
          nohup python3 server.py \
            --listen 127.0.0.1 \
            --port 6081 \
            --no-manage-screensharingd \
            > /tmp/macvncstream.log 2>&1 &
          echo "Server PID: $!"

          echo -n "Waiting for HTTP server..."
          for i in $(seq 1 20); do
            if nc -z 127.0.0.1 6081 2>/dev/null; then
              echo " UP"
              break
            fi
            sleep 1; echo -n "."
          done

          echo ""
          echo "=== Server log (first 40 lines) ==="
          head -40 /tmp/macvncstream.log || true

      # ── Reverse SSH tunnel to relay host ──────────────────────────────────
      # The runner SSHes to our relay machine (51.159.237.61) using a
      # restricted keypair. The tunfwd user can only do port forwarding —
      # no shell, no exec, no agent, no PTY (restrict + command=/bin/false).
      #
      # This creates:  relay:16081 → runner:localhost:6081
      #
      # On the relay machine, access the runner's web UI at:
      #   http://localhost:16081/?token=citest
      - name: Open reverse tunnel to relay
        env:
          TUNNEL_SSH_KEY: ${{ secrets.TUNNEL_SSH_KEY }}
          TUNNEL_HOST: ${{ secrets.TUNNEL_HOST }}
          TUNNEL_USER: ${{ secrets.TUNNEL_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$TUNNEL_SSH_KEY" > ~/.ssh/tunfwd_key
          chmod 600 ~/.ssh/tunfwd_key

          # Add relay host key to known_hosts to avoid interactive prompt
          ssh-keyscan -H "$TUNNEL_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Open reverse tunnel in background: relay:16081 → runner:6081
          ssh -i ~/.ssh/tunfwd_key \
              -o StrictHostKeyChecking=yes \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=4 \
              -R 16081:localhost:6081 \
              -N \
              "${TUNNEL_USER}@${TUNNEL_HOST}" &
          TUNNEL_PID=$!
          echo "Tunnel PID: $TUNNEL_PID"

          sleep 3
          echo "Tunnel open. On relay machine: http://localhost:16081/?token=citest"
          echo "Tunnel PID=$TUNNEL_PID" >> /tmp/tunnel.pid

      # ── tmate — SSH into this runner for manual inspection ────────────────
      # limit-access-to-actor: true restricts to your GitHub account's SSH key.
      # While tmate is running the tunnel is also running — access the web UI
      # on the relay machine at http://localhost:16081/?token=citest
      #
      # Useful commands once connected:
      #   tail -f /tmp/macvncstream.log
      #   sudo launchctl list | grep screen
      #   nc -z 127.0.0.1 5900 && echo "VNC up"
      #   python3 -c 'import av; print(av.__version__)'
      - name: tmate (SSH into this runner)
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 25
        with:
          limit-access-to-actor: true
